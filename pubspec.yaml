name: quickhelp
description: One tap. Three closest services. Zero typing.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Location
  geolocator: ^12.0.0
  permission_handler: ^11.3.0

  # Network
  http: ^1.2.1

  # Navigation & Calls
  url_launcher: ^6.3.1

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
